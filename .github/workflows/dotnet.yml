# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs: 
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        version: ["8.0", "9.0", "10.0"]

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.version }}.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build CFS.SnabNet.SourceGenerators
      run: dotnet build .\CFS.SnabNet.SourceGenerators\CFS.SnabNet.SourceGenerators.csproj --no-restore
    - name: Build CFS.SnabNet
      run: dotnet build .\CFS.SnabNet\CFS.SnabNet.csproj --no-restore --framework "net${{ matrix.version }}"
    - name: Test CFS.SnabNet
      run: dotnet test .\CFS.SnabNet.Tests\CFS.SnabNet.Tests.csproj --no-build --verbosity normal --framework "net${{ matrix.version }}" 
